<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Só 1% acerta tudo</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    text-align: center;
    color: white;
    padding: 30px;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ff5722;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔥 Só 1% acerta tudo!</h1>

<div class="box">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "Qual número vem depois: 1, 3, 6, 10, ?",
        answers: ["12", "13", "15", "14"],
        correct: 2
    },
    {
        question: "Se você tem 3 maçãs e pega mais 2, com quantas fica?",
        answers: ["3", "5", "2", "4"],
        correct: 1
    },
    {
        question: "O que pesa mais: 1kg de ferro ou 1kg de algodão?",
        answers: ["Ferro", "Algodão", "Igual", "Depende"],
        correct: 2
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = () => {
            if (i === q.correct) score++;
            current++;
            if (current < quiz.length) loadQuestion();
            else showResult();
        };
        answersDiv.appendChild(btn);
    });
}

function showResult() {
    let result = "";

    if (score === 3) result = "🔥 Você está entre o 1%!";
    else if (score === 2) result = "👏 Quase lá!";
    else result = "😅 Tente novamente!";

    document.getElementById("question").style.display = "none";
    document.getElementById("answers").style.display = "none";
    document.getElementById("result").innerText = `Você acertou ${score}/3\n${result}`;
}
  const shareBtn = document.getElementById("shareBtn");
    shareBtn.style.display = "block";

    shareBtn.onclick = () => {
        const text = `Eu fiz ${score}/5 no teste "Você é mais inteligente que a média?" 🤯\nTente você também!`;
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, "_blank");
loadQuestion();
</script>

</body>
</html>
