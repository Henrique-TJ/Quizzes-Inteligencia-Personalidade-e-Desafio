<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste de Inteligência</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    color: white;
    padding: 30px;
    padding-bottom: 90px;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🧠 Você é mais inteligente que a média?</h1>

<div class="box">
    <h2 id="question">Carregando...</h2>
    <div id="answers"></div>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "Qual número completa: 2, 4, 8, 16, ?",
        answers: ["18", "24", "32", "20"],
        correct: 2
    },
    {
        question: "Quanto é 12 x 8?",
        answers: ["96", "88", "108", "92"],
        correct: 0
    },
    {
        question: "Metade de 100 + 50 é:",
        answers: ["75", "100", "50", "25"],
        correct: 1
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = () => {
            if (i === q.correct) score++;
            current++;
            if (current < quiz.length) loadQuestion();
            else showResult();
        };
        answersDiv.appendChild(btn);
    });
}

function showResult() {
    let msg = "";

    if (score <= 1) msg = "😅 Abaixo da média";
    else if (score == 2) msg = "🙂 Na média";
    else msg = "🔥 Acima da média!";

    document.getElementById("question").style.display = "none";
    document.getElementById("answers").style.display = "none";

    document.getElementById("result").innerHTML = `
        Você acertou ${score}/3<br><br>${msg}
        <br><br>
        <button onclick="share()">📲 Compartilhar</button>
    `;
}

function share() {
    const text = `Eu fiz ${score}/3 no teste de inteligência 🤯`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

loadQuestion();
</script>

<!-- ANÚNCIO (seguro) -->
<div style="position:fixed;bottom:0;width:100%;background:#eee;padding:10px;">
🔵 Espaço para anúncio
</div>

</body>
</html>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</body>
</html>
