<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Você é mais inteligente que a média?</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
        padding: 40px;
    }

    .quiz-box {
        background: white;
        color: #333;
        padding: 20px;
        border-radius: 12px;
        max-width: 420px;
        margin: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        font-size: 20px;
        margin-top: 20px;
    }

    .share {
        margin-top: 20px;
        background: #25D366;
    }
</style>
</head>

<body>

<h1>🧠 Você é mais inteligente que a média?</h1>

<div class="quiz-box">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <div id="result" class="result"></div>
    <button id="shareBtn" class="share" style="display:none;">Compartilhar no WhatsApp</button>
</div>

<script>
const quiz = [
    {
        question: "Qual número completa a sequência: 2, 4, 8, 16, ?",
        answers: ["18", "24", "32", "20"],
        correct: 2
    },
    {
        question: "Se todos os bloops são razzies e todos os razzies são lazzies, então todos os bloops são lazzies?",
        answers: ["Sim", "Não", "Não é possível saber", "Apenas alguns"],
        correct: 0
    },
    {
        question: "Qual é o resultado de 12 x 8?",
        answers: ["96", "88", "108", "92"],
        correct: 0
    },
    {
        question: "Qual palavra está escrita corretamente?",
        answers: ["Excessão", "Exceção", "Excessao", "Exeção"],
        correct: 1
    },
    {
        question: "Qual número é metade de 100 + 50?",
        answers: ["75", "100", "50", "25"],
        correct: 1
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = () => checkAnswer(i);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(i) {
    if (i === quiz[current].correct) score++;
    current++;

    if (current < quiz.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function getLevel() {
    if (score <= 2) return "😅 Abaixo da média";
    if (score === 3) return "🙂 Na média";
    if (score === 4) return "😎 Acima da média";
    if (score === 5) return "🔥 Gênio!";
}

function showResult() {
    document.getElementById("question").style.display = "none";
    document.getElementById("answers").style.display = "none";

    const resultText = `Você acertou ${score}/5\n${getLevel()}`;
    document.getElementById("result").innerText = resultText;

    const shareBtn = document.getElementById("shareBtn");
    shareBtn.style.display = "block";

    shareBtn.onclick = () => {
        const text = `Eu fiz ${score}/5 no teste "Você é mais inteligente que a média?" 🤯\nTente você também!`;
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, "_blank");
    };
}

loadQuestion();
</script>

</body>
</html>
