<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Que tipo de pessoa você é?</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    padding: 30px;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #e91e63;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>❤️ Que tipo de pessoa você é?</h1>

<div class="box">
    <h2 id="question">Carregando...</h2>
    <div id="answers"></div>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "Você prefere:",
        answers: ["Ficar em casa", "Sair com amigos", "Explorar coisas novas"],
        points: [1, 2, 3]
    },
    {
        question: "Como reage a problemas?",
        answers: ["Penso muito", "Peço ajuda", "Resolvo rápido"],
        points: [1, 2, 3]
    },
    {
        question: "O que te define?",
        answers: ["Calmo", "Sociável", "Aventureiro"],
        points: [1, 2, 3]
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = () => {
            score += q.points[i];
            current++;
            if (current < quiz.length) loadQuestion();
            else showResult();
        };
        answersDiv.appendChild(btn);
    });
}

function showResult() {
    let result = "";

    if (score <= 4) result = "🌿 Você é tranquila e observadora";
    else if (score <= 7) result = "😊 Você é sociável e equilibrada";
    else result = "🔥 Você é aventureira e cheia de energia!";

    document.getElementById("question").style.display = "none";
    document.getElementById("answers").style.display = "none";

    document.getElementById("result").innerHTML = `
        ${result}
        <br><br>
        <button onclick="shareResult()">📲 Compartilhar no WhatsApp</button>
    `;
}

loadQuestion();
</script>

</body>
</html>
